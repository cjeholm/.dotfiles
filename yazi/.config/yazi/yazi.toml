[mgr]
show_hidden = false

[plugin]
prepend_preloaders = [
  { mime = "{audio,video,image}/*", run = "mediainfo" },
  { mime = "application/subrip", run = "mediainfo" },
  # { url = "*.{dng,DNG}", run = "exiftool -b -PreviewImage %1 > \"$YAZI_PREVIEW_PATH\"" }
]
prepend_previewers = [
  { mime = "image/*", run = "magick convert %1 \"PNG32:$YAZI_PREVIEW_PATH\" 2>/dev/null" },
  { mime = "application/subrip", run = "mediainfo" },
  # { url = "*.{dng,DNG}", run = "exiftool -b -PreviewImage %1 > \"$YAZI_PREVIEW_PATH\"" }
]
